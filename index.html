<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competição Diária ⚔️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="title">⚔️ Competição Diária</h1>
            <p class="date" id="currentDate"></p>
        </header>

        <!-- Placar geral -->
        <div class="scoreboard-card">
            <span class="sb-label">🏆 Placar</span>
            <div class="sb-scores">
                <span class="sb-name g-color">Guilherme</span>
                <span class="sb-pts g-color" id="g-points">0</span>
                <span class="sb-sep">×</span>
                <span class="sb-pts l-color" id="l-points">0</span>
                <span class="sb-name l-color">Luana</span>
            </div>
        </div>

        <main class="main">
            <div class="competitors">

                <!-- Guilherme -->
                <div class="competitor-card" id="guilherme-card">
                    <div class="competitor-header">
                        <div class="avatar g-avatar">G</div>
                        <div class="header-center">
                            <h2 class="competitor-name">Guilherme</h2>
                            <div class="overall-track">
                                <div class="overall-fill" id="g-overall-bar"></div>
                            </div>
                        </div>
                        <div class="overall-score g-color" id="g-overall">0%</div>
                    </div>

                    <div class="tasks">
                        <!-- Questões -->
                        <div class="task" id="g-questions-task">
                            <div class="task-info">
                                <span class="task-icon">📝</span>
                                <span class="task-label">Questões</span>
                                <span class="task-fraction"><span id="g-questions-count">0</span>/20</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="g-questions-bar"></div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-sub" onclick="updateQuestions('guilherme', -1)">−</button>
                                <button class="btn-add" onclick="updateQuestions('guilherme', 1)">+1</button>
                            </div>
                        </div>

                        <!-- Estudo -->
                        <div class="task" id="g-study-task">
                            <div class="task-info">
                                <span class="task-icon">📚</span>
                                <span class="task-label">Estudo</span>
                                <span class="task-fraction" id="g-study-display">0:00 / 2:00h</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="g-study-bar"></div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-timer" id="g-timer-btn" onclick="toggleTimer('guilherme')">▶ Iniciar</button>
                            </div>
                        </div>

                        <!-- Água -->
                        <div class="task" id="g-water-task">
                            <div class="task-info">
                                <span class="task-icon">💧</span>
                                <span class="task-label">Água</span>
                                <span class="task-fraction"><span id="g-water-display">0</span> / 4L</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="g-water-bar"></div>
                            </div>
                            <div class="task-actions water-btns">
                                <button class="btn-sub" onclick="updateWater('guilherme', -250)">−</button>
                                <button class="btn-add" onclick="updateWater('guilherme', 250)">+250ml</button>
                                <button class="btn-add" onclick="updateWater('guilherme', 500)">+500ml</button>
                            </div>
                        </div>

                        <!-- Academia -->
                        <div class="task" id="g-gym-task">
                            <div class="task-info">
                                <span class="task-icon">🏋️</span>
                                <span class="task-label">Academia</span>
                                <span class="task-fraction" id="g-gym-status">Não fui</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="g-gym-bar"></div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-gym" id="g-gym-btn" onclick="toggleGym('guilherme')">Marcar como feito</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="vs-badge">VS</div>

                <!-- Luana -->
                <div class="competitor-card" id="luana-card">
                    <div class="competitor-header">
                        <div class="avatar l-avatar">L</div>
                        <div class="header-center">
                            <h2 class="competitor-name">Luana</h2>
                            <div class="overall-track">
                                <div class="overall-fill" id="l-overall-bar"></div>
                            </div>
                        </div>
                        <div class="overall-score l-color" id="l-overall">0%</div>
                    </div>

                    <div class="tasks">
                        <!-- Questões -->
                        <div class="task" id="l-questions-task">
                            <div class="task-info">
                                <span class="task-icon">📝</span>
                                <span class="task-label">Questões</span>
                                <span class="task-fraction"><span id="l-questions-count">0</span>/20</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="l-questions-bar"></div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-sub" onclick="updateQuestions('luana', -1)">−</button>
                                <button class="btn-add" onclick="updateQuestions('luana', 1)">+1</button>
                            </div>
                        </div>

                        <!-- Estudo -->
                        <div class="task" id="l-study-task">
                            <div class="task-info">
                                <span class="task-icon">📚</span>
                                <span class="task-label">Estudo</span>
                                <span class="task-fraction" id="l-study-display">0:00 / 2:00h</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="l-study-bar"></div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-timer" id="l-timer-btn" onclick="toggleTimer('luana')">▶ Iniciar</button>
                            </div>
                        </div>

                        <!-- Água -->
                        <div class="task" id="l-water-task">
                            <div class="task-info">
                                <span class="task-icon">💧</span>
                                <span class="task-label">Água</span>
                                <span class="task-fraction"><span id="l-water-display">0</span> / 2.5L</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="l-water-bar"></div>
                            </div>
                            <div class="task-actions water-btns">
                                <button class="btn-sub" onclick="updateWater('luana', -250)">−</button>
                                <button class="btn-add" onclick="updateWater('luana', 250)">+250ml</button>
                                <button class="btn-add" onclick="updateWater('luana', 500)">+500ml</button>
                            </div>
                        </div>

                        <!-- Academia -->
                        <div class="task" id="l-gym-task">
                            <div class="task-info">
                                <span class="task-icon">🏋️</span>
                                <span class="task-label">Academia</span>
                                <span class="task-fraction" id="l-gym-status">Não fui</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="l-gym-bar"></div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-gym" id="l-gym-btn" onclick="toggleGym('luana')">Marcar como feito</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="winner-banner" id="winnerBanner" style="display:none">
                <span id="winnerText"></span>
            </div>
        </main>

        <footer class="footer">
            <button class="btn-reset" onclick="confirmReset()">🔄 Novo Dia</button>
        </footer>
    </div>

    <div class="modal-overlay" id="resetModal" style="display:none" onclick="closeModalOutside(event)">
        <div class="modal">
            <h3>Novo Dia</h3>
            <p>Tem certeza que quer resetar o progresso de hoje?</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-confirm" onclick="resetDay()">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
